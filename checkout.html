<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | M's Younique Cabin</title>

<link rel="icon" type="image/x-icon" href="m's logo  copy look - Copy (2).png"/>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">

<style>

body{
font-family:'Outfit',sans-serif;
background:#fdfcfe;
padding:2rem;
}

.back-btn{
display:inline-block;
margin-bottom:1rem;
background:#facc15;
color:#4c1d95;
padding:.6rem 1.4rem;
border-radius:999px;
font-weight:600;
text-decoration:none;
transition:.3s;
}

.back-btn:hover{
transform:scale(1.05);
background:#fde047;
}

h1{
color:#4c1d95;
margin-bottom:2rem;
text-align:center;
animation:fadeIn 1s ease;
}

.order-summary{
background:white;
padding:1.5rem;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fadeUp .8s ease;
}

.cart-item{
display:flex;
align-items:center;
margin-bottom:15px;
border-bottom:1px solid #eee;
padding-bottom:10px;
}

.cart-item img{
width:100px;
border-radius:10px;
margin-right:15px;
}

.cart-item div{
line-height:1.3;
}

form{
margin-top:2rem;
max-width:400px;
margin-left:auto;
margin-right:auto;
animation:fadeUp 1s ease;
}

input, textarea, select{
width:100%;
padding:1rem;
margin-bottom:1rem;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#4c1d95;
color:white;
padding:1rem;
border:none;
border-radius:999px;
width:100%;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#8b5cf6;
transform:scale(1.03);
}

.payment-box{
background:white;
padding:1rem;
border-radius:10px;
margin-bottom:1rem;
border:1px solid #eee;
}

.networks{
display:none;
margin-top:10px;
}

.network-option{
display:flex;
align-items:center;
gap:10px;
padding:8px;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.network-option:hover{
background:#f3f3f3;
}

.network-option img{
width:30px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Cart</a>

<h1>Checkout</h1>

<div class="order-summary" id="orderDetails"></div>

<form action="https://formsubmit.co/msyouniquecabin@gmail.com" method="POST">

<input type="hidden" name="_subject" value="New Order - M's Younique Cabin">
<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_replyto" id="customerReplyTo">

<input type="hidden" name="_autoresponse"
value="Your order has been confirmed at M's Younique Cabin. Your items will be delivered to your location shortly. Thank you for shopping with us.">

<input type="hidden" name="order_data" id="orderData">

<input type="text" name="customer_name" placeholder="Full Name" required>

<input type="email" name="customer_email" placeholder="Email Address" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<textarea name="address" placeholder="Delivery Address" required></textarea>

<div class="payment-box">

<strong>Select Payment Method</strong>

<label>
<input type="radio" name="payment_method" value="Mobile Money" onclick="showNetworks()">
Mobile Money
</label>

<div class="networks" id="networks">

<div class="network-option">
<img src="mtn.jpg">
<input type="radio" name="network" value="MTN"> MTN
</div>

<div class="network-option">
<img src="telecel.webp">
<input type="radio" name="network" value="Telecel"> Telecel
</div>

<div class="network-option">
<img src="airteltigo.webp">
<input type="radio" name="network" value="AirtelTigo"> AirtelTigo
</div>

</div>

<label>
<input type="radio" name="payment_method" value="ATM / Visa Card" onclick="hideNetworks()">
ATM / Visa Card
</label>

<label>
<input type="radio" name="payment_method" value="Pay on Delivery" onclick="hideNetworks()">
Pay on Delivery
</label>

</div>

<button type="submit">Place Order</button>

</form>

<script>

function showNetworks(){
document.getElementById("networks").style.display="block";
}

function hideNetworks(){
document.getElementById("networks").style.display="none";
}

const cart=JSON.parse(localStorage.getItem("cart"))||[];

const orderDetails=document.getElementById("orderDetails");
const orderDataInput=document.getElementById("orderData");

const customerEmailInput=document.querySelector('input[name="customer_email"]');
const customerReplyTo=document.getElementById("customerReplyTo");

let summary="";
let total=0;

cart.forEach(item=>{

total+=item.price*item.qty;

orderDetails.innerHTML+=`

<div class="cart-item">

<img src="${item.img}">

<div>

<strong>${item.brand}</strong><br>

Color: ${item.color}<br>

Size: ${item.size}<br>

Quantity: ${item.qty}<br>

Price: GHS ${item.price*item.qty}

</div>

</div>

`;

let imageURL=window.location.origin+"/"+item.img;

summary+=`

Product: ${item.brand}
Color: ${item.color}
Size: ${item.size}
Quantity: ${item.qty}
Price: GHS ${item.price*item.qty}

`;

});

summary+=`

Delivery Fee: GHS 40
Grand Total: GHS ${total+40}

`;

orderDataInput.value=summary;

customerEmailInput.addEventListener("input",()=>{
customerReplyTo.value=customerEmailInput.value;
});

customerReplyTo.value=customerEmailInput.value;

</script>

</body>
</html>
